server {
    listen 8510;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /migu/ {
        set $migu_upstream migu-video:1234;
        rewrite ^/migu/(.*)$ /$1 break;
        proxy_pass http://$migu_upstream;
        proxy_set_header Host 127.0.0.1:1234;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_set_header Accept-Encoding "";
        sub_filter_types text/plain audio/x-mpegurl application/x-mpegurl;
        sub_filter "http://127.0.0.1:1234/" "http://$http_host/migu/";
        sub_filter "http://127.0.0.1:3566/" "http://$http_host/migu/";
        sub_filter_once off;
    }

    location = /tvbox.json {
        default_type application/json;
        return 200 '{"sites":[],"parses":[],"flags":[],"lives":[{"name":"Fn IPTV Migu Live","type":0,"url":"http://$http_host/migu/txt","epg":"http://$http_host/migu/playback.xml"}]}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
